apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-deployment
  labels:
    app: control-plane
spec:
  replicas: 3
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
      - name: control-plane
        image: wneet/dsched-cp:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        - containerPort: 8081
        resources:
          requests:
            memory: "128Mi"
          limits:
            memory: "256Mi"
        env:
        - name: APP_DATABASE_URL
          value: postgres://admin:admin@postgres-svc.default.svc.cluster.local:5432/postgres
