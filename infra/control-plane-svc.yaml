apiVersion: v1
kind: Service
metadata:
  name: control-plane-svc-np
spec:
  type: NodePort
  selector:
    app: control-plane
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: tcp
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane-svc
spec:
  type: ClusterIP
  selector:
    app: control-plane
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: tcp
      port: 8081
      targetPort: 8081
